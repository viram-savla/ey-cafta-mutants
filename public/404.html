<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>BAML Risk Command Center</title>
<script>
  // GitHub Pages SPA redirect — keeps the path for client-side routing
  var segmentsToKeep = 1; // keep /ey-cafta-mutants
  var l = window.location;
  l.replace(
    l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
    l.pathname.split('/').slice(0, 1 + segmentsToKeep).join('/') + '/?p=/' +
    l.pathname.slice(1).split('/').slice(segmentsToKeep).join('/').replace(/&/g, '~and~') +
    (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
    l.hash
  );
</script>
</head>
<body>Redirecting...</body>
</html>
